<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人財務管理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "PingFang HK", "Helvetica Neue", Arial, sans-serif;
            background-color: #FFF7F3; /* Retro Hong Kong Milk Tea Pink Cream */
        }
        /* McDull Nostalgic Comic Style */
        .md-border {
            border: 2.5px solid #4a3328;
        }
        .md-card {
            background-color: #FFFFFF;
            border: 2.5px solid #4a3328;
            box-shadow: 5px 5px 0px #4a3328;
            border-radius: 24px;
        }
        .btn-pink {
            background-color: #fbc7c7; /* McDull Pink */
            color: #4a3328;
            border: 2.5px solid #4a3328;
            box-shadow: 2px 2px 0px #4a3328;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-pink:hover {
            background-color: #fca5a5;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #4a3328;
        }
        .btn-green {
            background-color: #a3ebd0; /* Chun Tin Flower Green */
            color: #4a3328;
            border: 2.5px solid #4a3328;
            box-shadow: 2px 2px 0px #4a3328;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-green:hover {
            background-color: #7ce0bc;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #4a3328;
        }
        .btn-yellow {
            background-color: #ffe17d; /* Egg Tart Yellow */
            color: #4a3328;
            border: 2.5px solid #4a3328;
            box-shadow: 2px 2px 0px #4a3328;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-yellow:hover {
            background-color: #fcd34d;
        }
        .btn-gray {
            background-color: #FAF4EE;
            color: #4a3328;
            border: 2.5px solid #4a3328;
            box-shadow: 2px 2px 0px #4a3328;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-gray:hover {
            background-color: #EFE4D8;
        }
        /* McDull Inputs border focus */
        input:focus, select:focus {
            border-color: #fbc7c7 !important;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen text-[#4a3328] pb-20">

    <!-- 1. MCDULL LOGIN / REGISTER SCREEN -->
    <div id="loginScreen" class="fixed inset-0 bg-[#FFF7F3] z-50 flex flex-col justify-center items-center px-4">
        <!-- Nostalgic Hong Kong Doodles backdrop simulation -->
        <div class="absolute inset-0 opacity-10 pointer-events-none flex flex-wrap content-around justify-around p-10 select-none">
            <span class="text-7xl">🐷</span>
            <span class="text-6xl">🌸</span>
            <span class="text-7xl">🥯</span>
            <span class="text-8xl">🍳</span>
        </div>
        
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full md-border shadow-[8px_8px_0px_#4a3328] text-center relative z-10">
            <div class="text-5xl mb-3">🐷</div>
            <h2 id="loginTitle" class="text-2xl font-black mb-1 text-[#4a3328]">我嘅財務管理系統</h2>
            
            <!-- Auth Tab Switcher -->
            <div class="flex justify-center space-x-2 mb-6 bg-[#FAF4EE] p-1 rounded-2xl md-border">
                <button id="tabLogin" onclick="switchAuthMode('login')" class="flex-1 py-1.5 text-xs font-black rounded-xl bg-white border-2 border-[#4a3328]">
                    返黎登入
                </button>
                <button id="tabRegister" onclick="switchAuthMode('register')" class="flex-1 py-1.5 text-xs font-black rounded-xl text-slate-500 hover:text-[#4a3328]">
                    新帳戶註冊
                </button>
            </div>

            <!-- Inputs -->
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-extrabold text-slate-600 mb-1">你嘅名 (Username)</label>
                    <input type="text" id="usernameInput" placeholder="請輸入你嘅名" class="w-full px-3 py-2 border-2 border-[#4a3328] rounded-xl font-bold text-sm bg-[#FFF7F3]">
                </div>
                <div>
                    <label class="block text-xs font-extrabold text-slate-600 mb-1">密碼 (Password)</label>
                    <input type="password" id="passwordInput" placeholder="請輸入密碼" class="w-full px-3 py-2 border-2 border-[#4a3328] rounded-xl font-bold text-sm bg-[#FFF7F3]">
                </div>

                <button id="submitAuthBtn" onclick="handleAuthAction()" class="w-full btn-pink font-bold text-sm py-2.5 transition mt-4">
                    開嚟見我！
                </button>
            </div>
            
            <p id="errorMsg" class="text-red-500 text-xs font-black mt-4 text-center hidden"></p>
        </div>
    </div>

    <!-- 2. MAIN DASHBOARD INTERFACE (Hidden by default) -->
    <div id="mainDashboard" class="hidden">
        <!-- McDull Header -->
        <header class="bg-white border-b-4 border-[#4a3328] py-6 px-4 mb-8">
            <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center text-center sm:text-left gap-4">
                <div class="flex items-center space-x-3">
                    <div>
                        <h1 class="text-2xl font-black tracking-tight text-[#4a3328]">
                            我嘅財務管理系統
                        </h1>
                        <p class="text-red-400 text-xs font-black mt-0.5">「雖然我無得去馬爾代夫，但我會好好儲錢！」</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-xs bg-[#ffe17d] border-2 border-[#4a3328] px-3 py-1.5 rounded-xl font-black shadow-[2px_2px_0px_#4a3328]">
                        👤 邊個喺度: <span id="currentUserDisplay" class="underline">麥兜</span>
                    </div>
                    <button onclick="handleLogout()" class="bg-red-100 hover:bg-red-200 border-2 border-[#4a3328] text-red-700 font-extrabold text-xs px-3 py-1.5 rounded-xl transition">
                        我要出去！🚪
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 space-y-8">

            <!-- SECTION 1: 個人收入 -->
            <section class="md-card p-6">
                <div class="flex flex-col lg:flex-row lg:items-center justify-between border-b-2 border-dashed border-[#4a3328]/20 pb-4 mb-6 gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">💰</span>
                        <h2 class="text-xl font-black text-[#4a3328]">打工收入 (公司名稱)</h2>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-3 bg-[#FFF7F3] p-3 rounded-xl border-2 border-[#4a3328]">
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">年份:</label>
                            <select id="incYearFilter" onchange="renderIncomeTable()" class="text-xs border-2 border-[#4a3328] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部年份</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">統計:</label>
                            <select id="incomeTimeRange" onchange="updateIncomeSummary()" class="text-xs border-2 border-[#4a3328] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部紀錄</option>
                                <option value="thisMonth">今個月</option>
                                <option value="3months">近 3 個月</option>
                                <option value="6months">近 6 個月</option>
                                <option value="thisYear">今年度</option>
                            </select>
                        </div>
                        <div class="text-xs font-black text-slate-700 border-l border-[#4a3328]/20 pl-3">
                            總淨收入 (扣埋強積金): <span id="summaryTotal" class="text-sm font-black text-red-500 ml-1">$0.00</span>
                        </div>
                    </div>
                </div>
                
                <form id="incomeForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 items-end bg-[#FFF7F3] p-4 rounded-xl border-2 border-[#4a3328]">
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">公司</label>
                        <input type="text" id="incCompany" required class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">出糧大日子</label>
                        <input type="date" id="incDate" required class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">基本薪金 (HKD)</label>
                        <input type="number" id="incBase" min="0" step="any" required oninput="calculateIncome()" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">花紅/獎金 (買雞用)</label>
                        <input type="number" id="incBonus" min="0" step="any" required value="0" oninput="calculateIncome()" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">強積金 (自動冇咗5%)</label>
                        <input type="text" id="incMpf" readonly class="w-full px-3 py-1.5 bg-slate-100 border-2 border-[#4a3328]/30 rounded-xl text-xs text-slate-600 font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">最終落袋 (HKD)</label>
                        <input type="text" id="incFinal" readonly class="w-full px-3 py-1.5 bg-slate-100 border-2 border-[#4a3328]/30 rounded-xl text-xs font-black text-red-500">
                    </div>
                    <div class="md:col-span-3 lg:col-span-6 flex justify-end gap-3 mt-2">
                        <button type="button" onclick="exportCSV('incomes')" class="btn-gray text-xs px-3 py-1.5 transition">
                            📥 匯出數據
                        </button>
                        <button type="submit" class="btn-pink text-xs px-5 py-1.5 transition">
                            儲存紀錄
                        </button>
                    </div>
                </form>

                <div class="mt-6 overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs font-bold">
                        <thead>
                            <tr class="bg-[#FFF7F3] text-slate-700 border-b-2 border-[#4a3328]">
                                <th class="py-2.5 px-4">公司</th>
                                <th class="py-2.5 px-4">出糧大日子</th>
                                <th class="py-2.5 px-4">基本人工</th>
                                <th class="py-2.5 px-4">花紅獎金</th>
                                <th class="py-2.5 px-4">強積金 (5%)</th>
                                <th class="py-2.5 px-4">最終落袋</th>
                                <th class="py-2.5 px-4 text-right">動作</th>
                            </tr>
                        </thead>
                        <tbody id="incomeTableBody" class="divide-y divide-[#4a3328]/10"></tbody>
                    </table>
                </div>
                
                <div id="incShowAllContainer" class="mt-4 text-center hidden">
                    <button id="incShowAllBtn" onclick="toggleShowAll('incomes')" class="text-xs font-black text-red-400 hover:underline">
                        顯示全部紀錄 ↓
                    </button>
                </div>
            </section>

            <!-- SECTION 2: 個人保險 -->
            <section class="md-card p-6">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b-2 border-dashed border-[#4a3328]/20 pb-4 mb-6 gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">🛡️</span>
                        <h2 class="text-xl font-black text-[#4a3328]">個人保險箱</h2>
                    </div>
                    <div class="flex items-center space-x-1.5 bg-[#FFF7F3] p-2 rounded-xl border-2 border-[#4a3328]">
                        <label class="text-xs font-black text-slate-600">年份:</label>
                        <select id="insYearFilter" onchange="renderInsuranceTable()" class="text-xs border-2 border-[#4a3328] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                            <option value="all">全部年份</option>
                        </select>
                    </div>
                </div>
                
                <form id="insuranceForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 items-end bg-[#FFF7F3] p-4 rounded-xl border-2 border-[#4a3328]">
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">保險公司</label>
                        <select id="insCompany" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                            <option value="FWD富衛保險">FWD富衛保險</option>
                            <option value="Bowtie">Bowtie</option>
                            <option value="Manulife宏利">Manulife宏利</option>
                            <option value="保誠Prudential">保誠Prudential</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">保險計劃</label>
                        <input type="text" id="insPlan" required class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">性質</label>
                        <select id="insType" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                            <option value="自願醫保">自願醫保</option>
                            <option value="危疾">危疾</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">繳費模式</label>
                        <select id="insMode" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                            <option value="年繳">年繳</option>
                            <option value="月繳">月繳</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">邊一日交錢</label>
                        <input type="date" id="insDate" required class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">交錢金額 (HKD)</label>
                        <input type="number" id="insAmount" min="0" step="any" required class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold">
                    </div>
                    <div class="md:col-span-3 lg:col-span-6 flex justify-end gap-3 mt-2">
                        <button type="button" onclick="exportCSV('insurances')" class="btn-gray text-xs px-3 py-1.5 transition">
                            📥 匯出數據
                        </button>
                        <button type="submit" class="btn-pink text-xs px-5 py-1.5 transition">
                            儲存紀錄
                        </button>
                    </div>
                </form>

                <div class="mt-6 overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs font-bold">
                        <thead>
                            <tr class="bg-[#FFF7F3] text-slate-700 border-b-2 border-[#4a3328]">
                                <th class="py-2.5 px-4">保險公司</th>
                                <th class="py-2.5 px-4">保險計劃</th>
                                <th class="py-2.5 px-4">性質</th>
                                <th class="py-2.5 px-4">繳費模式</th>
                                <th class="py-2.5 px-4">日期</th>
                                <th class="py-2.5 px-4">交錢金額</th>
                                <th class="py-2.5 px-4 text-right">動作</th>
                            </tr>
                        </thead>
                        <tbody id="insuranceTableBody" class="divide-y divide-[#4a3328]/10"></tbody>
                    </table>
                </div>

                <div id="insShowAllContainer" class="mt-4 text-center hidden">
                    <button id="insShowAllBtn" onclick="toggleShowAll('insurances')" class="text-xs font-black text-red-400 hover:underline">
                        顯示全部紀錄 ↓
                    </button>
                </div>
            </section>

            <!-- SECTION 3: 定期存款 -->
            <section class="md-card p-6">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b-2 border-dashed border-[#4a3328]/20 pb-4 mb-6 gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">🏦</span>
                        <h2 class="text-xl font-black text-[#4a3328]">定期存款</h2>
                    </div>
                    <div class="flex items-center space-x-1.5 bg-[#FFF7F3] p-2 rounded-xl border-2 border-[#4a3328]">
                        <label class="text-xs font-black text-slate-600">年份:</label>
                        <select id="depYearFilter" onchange="renderDepositTable()" class="text-xs border-2 border-[#4a3328] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                            <option value="all">全部年份</option>
                        </select>
                    </div>
                </div>
                
                <form id="depositForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-7 gap-4 items-end bg-[#FFF7F3] p-4 rounded-xl border-2 border-[#4a3328]">
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">邊間銀行</label>
                        <input type="text" id="depBank" required class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">起息日子</label>
                        <input type="date" id="depDate" required class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">定期時長</label>
                        <select id="depDuration" onchange="calculateDeposit()" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                            <option value="3個月">3個月</option>
                            <option value="6個月">6個月</option>
                            <option value="1年">1年</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">本金 (HKD)</label>
                        <input type="number" id="depPrincipal" min="0" step="any" required oninput="calculateDeposit()" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">年利率 (%)</label>
                        <input type="number" id="depRate" min="0" max="100" step="0.01" required oninput="calculateDeposit()" placeholder="e.g. 3.5" class="w-full px-3 py-1.5 border-2 border-[#4a3328] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">利息 (自動)</label>
                        <input type="text" id="depInterest" readonly class="w-full px-3 py-1.5 bg-slate-100 border-2 border-[#4a3328]/30 rounded-xl text-xs font-bold text-orange-600">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">最終落袋 (HKD)</label>
                        <input type="text" id="depFinal" readonly class="w-full px-3 py-1.5 bg-slate-100 border-2 border-[#4a3328]/30 rounded-xl text-xs font-black text-[#28b67c]">
                    </div>
                    <div class="md:col-span-3 lg:col-span-7 flex justify-end gap-3 mt-2">
                        <button type="button" onclick="exportCSV('deposits')" class="btn-gray text-xs px-3 py-1.5 transition">
                            📥 匯出數據
                        </button>
                        <button type="submit" class="btn-green text-xs px-5 py-1.5 transition">
                            儲存紀錄
                        </button>
                    </div>
                </form>

                <div class="mt-6 overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs font-bold">
                        <thead>
                            <tr class="bg-[#FFF7F3] text-slate-700 border-b-2 border-[#4a3328]">
                                <th class="py-2.5 px-4">邊間銀行</th>
                                <th class="py-2.5 px-4">起息日子</th>
                                <th class="py-2.5 px-4">定期時長</th>
                                <th class="py-2.5 px-4">本金</th>
                                <th class="py-2.5 px-4">年利率</th>
                                <th class="py-2.5 px-4 text-orange-600">利息</th>
                                <th class="py-2.5 px-4">最終落袋</th>
                                <th class="py-2.5 px-4 text-right">動作</th>
                            </tr>
                        </thead>
                        <tbody id="depositTableBody" class="divide-y divide-[#4a3328]/10"></tbody>
                    </table>
                </div>

                <div id="depShowAllContainer" class="mt-4 text-center hidden">
                    <button id="depShowAllBtn" onclick="toggleShowAll('deposits')" class="text-xs font-black text-red-400 hover:underline">
                        顯示全部紀錄 ↓
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- JavaScript Handling Authentication, Computations, and User Separation -->
    <script>
        // --- 1. Multi-User Authentication System ---
        let currentAuthMode = 'login'; 
        let activeUser = null;

        function switchAuthMode(mode) {
            currentAuthMode = mode;
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const submitAuthBtn = document.getElementById('submitAuthBtn');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.classList.add('hidden');

            if (mode === 'login') {
                tabLogin.className = "flex-1 py-1.5 text-xs font-black rounded-xl bg-white border-2 border-[#4a3328]";
                tabRegister.className = "flex-1 py-1.5 text-xs font-black rounded-xl text-slate-500 hover:text-[#4a3328]";
                submitAuthBtn.innerHTML = "開嚟見我！";
            } else {
                tabRegister.className = "flex-1 py-1.5 text-xs font-black rounded-xl bg-white border-2 border-[#4a3328]";
                tabLogin.className = "flex-1 py-1.5 text-xs font-black rounded-xl text-slate-500 hover:text-[#4a3328]";
                submitAuthBtn.innerHTML = "加入";
            }
        }

        function getRegisteredUsers() {
            const users = localStorage.getItem('toy_story_users_list');
            return users ? JSON.parse(users) : {};
        }

        function handleAuthAction() {
            const usernameInput = document.getElementById('usernameInput').value.trim();
            const passwordInput = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!usernameInput || !passwordInput) {
                showAuthError("要話我聽你係邊位同密碼先得㗎！");
                return;
            }

            const users = getRegisteredUsers();

            if (currentAuthMode === 'login') {
                if (users[usernameInput] && users[usernameInput] === passwordInput) {
                    errorMsg.classList.add('hidden');
                    loginSuccess(usernameInput);
                } else {
                    showAuthError("⚠️ 密碼定名錯咗？");
                }
            } else {
                if (users[usernameInput]) {
                    showAuthError("⚠️ 呢個名一早俾其他人用咗啦！");
                } else {
                    users[usernameInput] = passwordInput;
                    localStorage.setItem('toy_story_users_list', JSON.stringify(users));
                    alert(`🎉 [ ${usernameInput} ] 歡迎來到個人財務管理系統！`);
                    errorMsg.classList.add('hidden');
                    loginSuccess(usernameInput);
                }
            }
        }

        function showAuthError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function loginSuccess(username) {
            activeUser = username;
            document.getElementById('currentUserDisplay').textContent = username;
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            
            loadUserRecords();

            activeUser = null;
            document.getElementById('usernameInput').value = "";

        };

        function loadUserRecords() {
            const isolatedKey = `toy_story_records_${activeUser}`;
            const storedData = localStorage.getItem(isolatedKey);
            if (storedData) {
                records = JSON.parse(storedData);
                sortAllRecordsByDate();
            } else {
                records = { incomes: [], insurances: [], deposits: [] };
            }
            
            viewState.incomes.editIndex = null;

            viewState.deposits.editIndex = null;

        // --- 3. Dynamic Auto Calculations ---

        function calculateIncome() {
            const base = parseFloat(document.getElementById('incBase').value) || 0;
            const bonus = parseFloat(document.getElementById('incBonus').value) || 0;
            const mpf = base * 0.05;
            const final = base + bonus - mpf;

            document.getElementById('incMpf').value = mpf.toFixed(2);
            document.getElementById('incFinal').value = final.toFixed(2);
        }

        function calculateDeposit() {
            const principal = parseFloat(document.getElementById('depPrincipal').value) || 0;
            const ratePercent = parseFloat(document.getElementById('depRate').value) || 0;
            const duration = document.getElementById('depDuration').value;

            const rate = ratePercent / 100;
            let timeFactor = duration === "3個月" ? 0.25 : (duration === "6個月" ? 0.5 : 1.0);

            const finalAmount = principal * (1 + (rate * timeFactor));
            const interest = finalAmount - principal;

            document.getElementById('depInterest').value = interest.toFixed(2);
            document.getElementById('depFinal').value = finalAmount.toFixed(2);
        }

        function sortAllRecordsByDate() {
            records.incomes.sort((a, b) => new Date(b.date) - new Date(a.date));
            records.insurances.sort((a, b) => new Date(b.date) - new Date(a.date));
            records.deposits.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function populateYearFilters() {
            const getYears = (arr) => [...new Set(arr.map(item => new Date(item.date).getFullYear()))].sort((a,b)=>b-a);
            
            ['inc', 'ins', 'dep'].forEach(prefix => {
                const select = document.getElementById(`${prefix}YearFilter`);
                const currentVal = select.value;
                select.innerHTML = '<option value="all">全部年份</option>';
                
                let targetArr = prefix === 'inc' ? records.incomes : (prefix === 'ins' ? records.insurances : records.deposits);
                getYears(targetArr).forEach(year => {
                    if(!isNaN(year)) select.innerHTML += `<option value="${year}">${year}年</option>`;

                select.value = currentVal; 
            });

        function startInlineEdit(category, index) {
            viewState[category].editIndex = index;
            renderAllTables();
        }

        function cancelInlineEdit(category) {
            viewState[category].editIndex = null;
            renderAllTables();
        }

        function saveInlineEdit(category, index) {
            if (category === 'incomes') {
                const base = parseFloat(document.getElementById('editIncBase').value) || 0;
                const bonus = parseFloat(document.getElementById('editIncBonus').value) || 0;
                const mpf = base * 0.05;
                records.incomes[index] = {
                    company: document.getElementById('editIncComp').value,
                    date: document.getElementById('editIncDate').value,
                    base: base,
                    bonus: bonus,
                    mpf: mpf,
                    final: base + bonus - mpf
                };
            } else if (category === 'insurances') {
                records.insurances[index] = {
                    company: document.getElementById('editInsComp').value,
                    plan: document.getElementById('editInsPlan').value,
                    type: document.getElementById('editInsType').value,
                    mode: document.getElementById('editInsMode').value,
                    date: document.getElementById('editInsDate').value,
                    amount: parseFloat(document.getElementById('editInsAmount').value) || 0
                };
            } else if (category === 'deposits') {
                const principal = parseFloat(document.getElementById('editDepPri').value) || 0;
                const ratePercent = parseFloat(document.getElementById('editDepRate').value) || 0;
                const duration = document.getElementById('editDepDur').value;
                let tf = duration === "3個月" ? 0.25 : (duration === "6個月" ? 0.5 : 1.0);
                const final = principal * (1 + ((ratePercent / 100) * tf));
                
                records.deposits[index] = {
                    bank: document.getElementById('editDepBank').value,
                    date: document.getElementById('editDepDate').value,
                    duration: duration,
                    principal: principal,
                    rate: ratePercent,
                    interest: final - principal,
                    final: final
                };
            }
            viewState[category].editIndex = null;
            saveData();
        }


        // --- 7. Range Summary Filter ---

        function updateIncomeSummary() {
            const range = document.getElementById('incomeTimeRange').value;
            const today = new Date();
            let sum = 0;

            records.incomes.forEach(item => {
                const itemDate = new Date(item.date);
                let matches = false;

                if (range === 'all') matches = true;
                else if (range === 'thisMonth') matches = itemDate.getFullYear() === today.getFullYear() && itemDate.getMonth() === today.getMonth();
                else if (range === 'thisYear') matches = itemDate.getFullYear() === today.getFullYear();
                else if (range === '3months') {
                    const cutoff = new Date(); cutoff.setMonth(today.getMonth() - 3);
                    matches = itemDate >= cutoff && itemDate <= today;
                } else if (range === '6months') {
                    const cutoff = new Date(); cutoff.setMonth(today.getMonth() - 6);
                    matches = itemDate >= cutoff && itemDate <= today;
                }

                if (matches) sum += parseFloat(item.final) || 0;
            });
            document.getElementById('summaryTotal').textContent = `$${sum.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

            const list = records[category];
            if (!list || list.length === 0) {
                alert('目前沒有資料可以匯出。');
                return;
            }

            let csvContent = "";
            let fileName = "";

            if (category === 'incomes') {
                csvContent += "公司名稱,日期,基本薪金,花紅_獎金,強積金(5%),最終收入\n";
                list.forEach(item => csvContent += `"${item.company}","${item.date}",${item.base},${item.bonus},${item.mpf},${item.final}\n`);
                fileName = `${activeUser}_McDull_打工收入紀錄.csv`;
            } else if (category === 'insurances') {
                csvContent += "保險公司,保險計劃,性質,繳費模式,日期,繳費金額\n";
                list.forEach(item => csvContent += `"${item.company}","${item.plan}","${item.type}","${item.mode}","${item.date}",${item.amount}\n`);
                fileName = `${activeUser}_McDull_保險紀錄.csv`;
            } else if (category === 'deposits') {
                csvContent += "銀行,起息日期,定期時長,本金,年利率(%),利息,最終可得\n";
                list.forEach(item => {
                    const interest = item.interest || (item.final - item.principal);
                    csvContent += `"${item.bank}","${item.date}","${item.duration}",${item.principal},${item.rate},${interest.toFixed(2)},${item.final}\n`;
                });
                fileName = `${activeUser}_McDull_定期定存紀錄.csv`;
            }

            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }


        // --- 9. Standard Submission Listeners ---

        document.getElementById('incomeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const base = parseFloat(document.getElementById('incBase').value);
            const bonus = parseFloat(document.getElementById('incBonus').value);
            const mpf = base * 0.05;

            records.incomes.push({
                company: document.getElementById('incCompany').value,
                date: document.getElementById('incDate').value,
                base: base,
                bonus: bonus,
                mpf: mpf,
                final: base + bonus - mpf
            });

            saveData();
            this.reset();
            document.getElementById('incDate').value = new Date().toISOString().split('T')[0];
        });

        document.getElementById('insuranceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            records.insurances.push({
                company: document.getElementById('insCompany').value,
                plan: document.getElementById('insPlan').value,
                type: document.getElementById('insType').value,
                mode: document.getElementById('insMode').value,
                date: document.getElementById('insDate').value,
                amount: parseFloat(document.getElementById('insAmount').value)
            });

            saveData();
            this.reset();
            document.getElementById('insDate').value = new Date().toISOString().split('T')[0];
        });

        document.getElementById('depositForm').addEventListener('submit', function(e) {
            e.preventDefault();
            calculateDeposit(); 
            const principal = parseFloat(document.getElementById('depPrincipal').value);
            const final = parseFloat(document.getElementById('depFinal').value);

            records.deposits.push({
                bank: document.getElementById('depBank').value,
                date: document.getElementById('depDate').value,
                duration: document.getElementById('depDuration').value,
                principal: principal,
                rate: parseFloat(document.getElementById('depRate').value),
                interest: final - principal,
                final: final
            });

            saveData();
            this.reset();
            document.getElementById('depDate').value = new Date().toISOString().split('T')[0];
        });

        function deleteRecord(category, index) {
            if (confirm('確定要掉走呢筆紀錄？')) {
                records[category].splice(index, 1);
                saveData();
            }
        }
    </script>
</body>
</html>
