<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人財務管理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "PingFang HK", "Helvetica Neue", Arial, sans-serif;
            background-color: #F0F7FF; /* Soft Light Blue Background */
        }
        /* Hand-drawn Outline Light Blue Style */
        .md-border {
            border: 2.5px solid #1E293B;
        }
        .md-card {
            background-color: #FFFFFF;
            border: 2.5px solid #1E293B;
            box-shadow: 5px 5px 0px #1E293B;
            border-radius: 24px;
        }
        .btn-pink {
            background-color: #BAE6FD; /* Soft Light Sky Blue */
            color: #0F172A;
            border: 2.5px solid #1E293B;
            box-shadow: 2px 2px 0px #1E293B;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-pink:hover {
            background-color: #7DD3FC;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #1E293B;
        }
        .btn-green {
            background-color: #A7F3D0; /* Mint Blue Green */
            color: #0F172A;
            border: 2.5px solid #1E293B;
            box-shadow: 2px 2px 0px #1E293B;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-green:hover {
            background-color: #6EE7B7;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #1E293B;
        }
        .btn-yellow {
            background-color: #E0F2FE; /* Very Light Ice Blue */
            color: #0F172A;
            border: 2.5px solid #1E293B;
            box-shadow: 2px 2px 0px #1E293B;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-yellow:hover {
            background-color: #BAE6FD;
        }
        .btn-gray {
            background-color: #F1F5F9;
            color: #0F172A;
            border: 2.5px solid #1E293B;
            box-shadow: 2px 2px 0px #1E293B;
            border-radius: 14px;
            font-weight: 900;
        }
        .btn-gray:hover {
            background-color: #E2E8F0;
        }
        /* Light Blue Inputs border focus */
        input:focus, select:focus {
            border-color: #38BDF8 !important;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen text-[#0F172A] pb-20">

    <!-- 1. LOGIN / REGISTER SCREEN -->
    <div id="loginScreen" class="fixed inset-0 bg-[#F0F7FF] z-50 flex flex-col justify-center items-center px-4">
        <div class="absolute inset-0 opacity-10 pointer-events-none flex flex-wrap content-around justify-around p-10 select-none">
        </div>
        
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full md-border shadow-[8px_8px_0px_#1E293B] text-center relative z-10">
            <h2 id="loginTitle" class="text-2xl font-black mb-1 text-[#0F172A]">我嘅財務管理系統</h2>
            
            <div class="flex justify-center space-x-2 mb-6 bg-[#F8FAFC] p-1 rounded-2xl md-border">
                <button id="tabLogin" type="button" onclick="switchAuthMode('login')" class="flex-1 py-1.5 text-xs font-black rounded-xl bg-white border-2 border-[#1E293B]">
                    返嚟登入
                </button>
                <button id="tabRegister" type="button" onclick="switchAuthMode('register')" class="flex-1 py-1.5 text-xs font-black rounded-xl text-slate-500 hover:text-[#0F172A]">
                    新用戶註冊
                </button>
            </div>

            <!-- 表單支援 Enter 鍵提交 -->
            <form id="authForm" onsubmit="event.preventDefault(); handleAuthAction();" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-extrabold text-slate-600 mb-1">你嘅名 (Username)</label>
                    <input type="text" id="usernameInput" placeholder="請輸入你嘅名" class="w-full px-3 py-2 border-2 border-[#1E293B] rounded-xl font-bold text-sm bg-[#F0F7FF]">
                </div>
                <div>
                    <label class="block text-xs font-extrabold text-slate-600 mb-1">密碼 (Password)</label>
                    <input type="password" id="passwordInput" placeholder="請輸入密碼" class="w-full px-3 py-2 border-2 border-[#1E293B] rounded-xl font-bold text-sm bg-[#F0F7FF]">
                </div>

                <button id="submitAuthBtn" type="submit" class="w-full btn-pink font-bold text-sm py-2.5 transition mt-4">
                    開嚟見我！
                </button>
            </form>
            
            <p id="errorMsg" class="text-red-500 text-xs font-black mt-4 text-center hidden"></p>
        </div>
    </div>

    <!-- 2. MAIN DASHBOARD INTERFACE (Hidden by default) -->
    <div id="mainDashboard" class="hidden">
        <header class="bg-white border-b-4 border-[#1E293B] py-6 px-4 mb-8">
            <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center text-center sm:text-left gap-4">
                <div class="flex items-center space-x-3">
                    <div>
                        <h1 class="text-2xl font-black tracking-tight text-[#0F172A]">
                            我嘅財務管理系統
                        </h1>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <button onclick="exportAllSectionsCSV()" class="btn-yellow text-xs px-3 py-1.5 transition">
                        📦 匯出全部紀錄
                    </button>
                    <div class="text-xs bg-[#BAE6FD] border-2 border-[#1E293B] px-3 py-1.5 rounded-xl font-black shadow-[2px_2px_0px_#1E293B]">
                        👤 邊個喺度: <span id="currentUserDisplay" class="underline">使用者</span>
                    </div>
                    <button onclick="handleLogout()" class="bg-red-100 hover:bg-red-200 border-2 border-[#1E293B] text-red-700 font-extrabold text-xs px-3 py-1.5 rounded-xl transition">
                        我要出去！🚪
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 space-y-8">

            <!-- SECTION 1: 個人收入 -->
            <section class="md-card p-6">
                <div class="flex flex-col lg:flex-row lg:items-center justify-between border-b-2 border-dashed border-[#1E293B]/20 pb-4 mb-6 gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">💰</span>
                        <h2 class="text-xl font-black text-[#0F172A]">打工收入 (公司名稱)</h2>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-3 bg-[#F0F7FF] p-3 rounded-xl border-2 border-[#1E293B]">
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">公司:</label>
                            <select id="incCompanyFilter" onchange="renderIncomeTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部公司</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">年份:</label>
                            <select id="incYearFilter" onchange="renderIncomeTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部年份</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-1">
                            <label class="text-xs font-black text-slate-600">由:</label>
                            <input type="date" id="incStartDate" onchange="renderIncomeTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-1 py-0.5 bg-white font-bold">
                            <label class="text-xs font-black text-slate-600">至:</label>
                            <input type="date" id="incEndDate" onchange="renderIncomeTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-1 py-0.5 bg-white font-bold">
                            <button onclick="clearDateFilter('inc')" class="text-[10px] bg-slate-200 border border-[#1E293B] px-1 rounded">清除</button>
                        </div>
                        <div class="text-xs font-black text-slate-700 border-l border-[#1E293B]/20 pl-3">
                            篩選總淨收入: <span id="summaryTotal" class="text-sm font-black text-sky-600 ml-1">$0.00</span>
                        </div>
                    </div>
                </div>
                
                <form id="incomeForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 items-end bg-[#F0F7FF] p-4 rounded-xl border-2 border-[#1E293B]">
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">公司</label>
                        <input type="text" id="incCompany" required class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">出糧大日子</label>
                        <input type="date" id="incDate" required class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">基本薪金 (HKD)</label>
                        <input type="number" id="incBase" min="0" step="any" required oninput="calculateIncome()" class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">花紅/獎金 (買花戴🌹)</label>
                        <input type="number" id="incBonus" min="0" step="any" required value="0" oninput="calculateIncome()" class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">強積金 (上限 $1,500)</label>
                        <input type="text" id="incMpf" readonly class="w-full px-3 py-1.5 bg-slate-100 border-2 border-[#1E293B]/30 rounded-xl text-xs text-slate-600 font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">最終落袋 (HKD)</label>
                        <input type="text" id="incFinal" readonly class="w-full px-3 py-1.5 bg-slate-100 border-2 border-[#1E293B]/30 rounded-xl text-xs font-black text-sky-600">
                    </div>
                    <div class="md:col-span-3 lg:col-span-6 flex justify-end gap-3 mt-2">
                        <button type="button" onclick="exportCSV('incomes')" class="btn-gray text-xs px-3 py-1.5 transition">
                            📥 匯出此部分數據
                        </button>
                        <button type="submit" class="btn-pink text-xs px-5 py-1.5 transition">
                            儲存紀錄
                        </button>
                    </div>
                </form>

                <div class="mt-6 overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs font-bold">
                        <thead>
                            <tr class="bg-[#F0F7FF] text-slate-700 border-b-2 border-[#1E293B]">
                                <th class="py-2.5 px-4">公司</th>
                                <th class="py-2.5 px-4">出糧大日子</th>
                                <th class="py-2.5 px-4">基本人工</th>
                                <th class="py-2.5 px-4">花紅獎金</th>
                                <th class="py-2.5 px-4">強積金</th>
                                <th class="py-2.5 px-4">最終落袋</th>
                                <th class="py-2.5 px-4 text-right">動作</th>
                            </tr>
                        </thead>
                        <tbody id="incomeTableBody" class="divide-y divide-[#1E293B]/10"></tbody>
                    </table>
                </div>
                
                <div id="incShowAllContainer" class="mt-4 text-center hidden">
                    <button id="incShowAllBtn" onclick="toggleShowAll('incomes')" class="text-xs font-black text-sky-600 hover:underline">
                        顯示全部紀錄 ↓
                    </button>
                </div>
            </section>

            <!-- SECTION 2: 個人保險 -->
            <section class="md-card p-6">
                <div class="flex flex-col lg:flex-row lg:items-center justify-between border-b-2 border-dashed border-[#1E293B]/20 pb-4 mb-6 gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">🛡️</span>
                        <h2 class="text-xl font-black text-[#0F172A]">個人保險</h2>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-3 bg-[#F0F7FF] p-3 rounded-xl border-2 border-[#1E293B]">
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">保險公司:</label>
                            <select id="insCompanyFilter" onchange="renderInsuranceTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部公司</option>
                                <option value="FWD富衛保險">FWD富衛保險</option>
                                <option value="Bowtie">Bowtie</option>
                                <option value="Manulife宏利">Manulife宏利</option>
                                <option value="保誠Prudential">保誠Prudential</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">年份:</label>
                            <select id="insYearFilter" onchange="renderInsuranceTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部年份</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-1">
                            <label class="text-xs font-black text-slate-600">由:</label>
                            <input type="date" id="insStartDate" onchange="renderInsuranceTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-1 py-0.5 bg-white font-bold">
                            <label class="text-xs font-black text-slate-600">至:</label>
                            <input type="date" id="insEndDate" onchange="renderInsuranceTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-1 py-0.5 bg-white font-bold">
                            <button onclick="clearDateFilter('ins')" class="text-[10px] bg-slate-200 border border-[#1E293B] px-1 rounded">清除</button>
                        </div>
                        <div class="text-xs font-black text-slate-700 border-l border-[#1E293B]/20 pl-3">
                            篩選總保費: <span id="insFilterTotalSum" class="text-sm font-black text-blue-600 ml-1">$0.00</span>
                        </div>
                    </div>
                </div>
                
                <form id="insuranceForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4 items-end bg-[#F0F7FF] p-4 rounded-xl border-2 border-[#1E293B]">
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">保險公司</label>
                        <select id="insCompany" class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                            <option value="FWD富衛保險">FWD富衛保險</option>
                            <option value="Bowtie">Bowtie</option>
                            <option value="Manulife宏利">Manulife宏利</option>
                            <option value="保誠Prudential">保誠Prudential</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">保險計劃</label>
                        <input type="text" id="insPlan" required class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">性質</label>
                        <select id="insType" class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                            <option value="自願醫保">自願醫保</option>
                            <option value="危疾">危疾</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">繳費模式</label>
                        <select id="insMode" class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                            <option value="年繳">年繳</option>
                            <option value="月繳">月繳</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">邊一日交錢</label>
                        <input type="date" id="insDate" required class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">交錢金額 (HKD)</label>
                        <input type="number" id="insAmount" min="0" step="any" required class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold">
                    </div>
                    <div class="md:col-span-3 lg:col-span-6 flex justify-end gap-3 mt-2">
                        <button type="button" onclick="exportCSV('insurances')" class="btn-gray text-xs px-3 py-1.5 transition">
                            📥 匯出此部分數據
                        </button>
                        <button type="submit" class="btn-pink text-xs px-5 py-1.5 transition">
                            儲存紀錄
                        </button>
                    </div>
                </form>

                <div class="mt-6 overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs font-bold">
                        <thead>
                            <tr class="bg-[#F0F7FF] text-slate-700 border-b-2 border-[#1E293B]">
                                <th class="py-2.5 px-4">保險公司</th>
                                <th class="py-2.5 px-4">保險計劃</th>
                                <th class="py-2.5 px-4">性質</th>
                                <th class="py-2.5 px-4">繳費模式</th>
                                <th class="py-2.5 px-4">日期</th>
                                <th class="py-2.5 px-4">交錢金額</th>
                                <th class="py-2.5 px-4 text-right">動作</th>
                            </tr>
                        </thead>
                        <tbody id="insuranceTableBody" class="divide-y divide-[#1E293B]/10"></tbody>
                    </table>
                </div>

                <div id="insShowAllContainer" class="mt-4 text-center hidden">
                    <button id="insShowAllBtn" onclick="toggleShowAll('insurances')" class="text-xs font-black text-sky-600 hover:underline">
                        顯示全部紀錄 ↓
                    </button>
                </div>
            </section>

            <!-- SECTION 3: 定期存款 -->
            <section class="md-card p-6">
                <div class="flex flex-col lg:flex-row lg:items-center justify-between border-b-2 border-dashed border-[#1E293B]/20 pb-4 mb-6 gap-4">
                    <div class="flex items-center space-x-2">
                        <span class="text-2xl">🏦</span>
                        <h2 class="text-xl font-black text-[#0F172A]">定期存款</h2>
                    </div>

                    <div class="flex flex-wrap items-center gap-3 bg-[#F0F7FF] p-3 rounded-xl border-2 border-[#1E293B]">
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">銀行篩選:</label>
                            <select id="depBankFilter" onchange="renderDepositTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部銀行</option>
                                <option value="渣打銀行">渣打銀行</option>
                                <option value="恆生銀行">恆生銀行</option>
                                <option value="匯豐銀行">匯豐銀行</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-1.5">
                            <label class="text-xs font-black text-slate-600">年份:</label>
                            <select id="depYearFilter" onchange="renderDepositTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-2 py-1 bg-white font-bold focus:outline-none">
                                <option value="all">全部年份</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-1">
                            <label class="text-xs font-black text-slate-600">由:</label>
                            <input type="date" id="depStartDate" onchange="renderDepositTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-1 py-0.5 bg-white font-bold">
                            <label class="text-xs font-black text-slate-600">至:</label>
                            <input type="date" id="depEndDate" onchange="renderDepositTable()" class="text-xs border-2 border-[#1E293B] rounded-lg px-1 py-0.5 bg-white font-bold">
                            <button onclick="clearDateFilter('dep')" class="text-[10px] bg-slate-200 border border-[#1E293B] px-1 rounded">清除</button>
                        </div>
                        <div class="text-xs font-black text-slate-700 border-l border-[#1E293B]/20 pl-3">
                            篩選總落袋: <span id="depFilterTotalSum" class="text-sm font-black text-emerald-600 ml-1">$0.00</span>
                        </div>
                    </div>
                </div>
                
                <form id="depositForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-7 gap-4 items-end bg-[#F0F7FF] p-4 rounded-xl border-2 border-[#1E293B]">
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">邊間銀行</label>
                        <select id="depBank" class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                            <option value="渣打銀行">渣打銀行</option>
                            <option value="恆生銀行">恆生銀行</option>
                            <option value="匯豐銀行">匯豐銀行</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">起息日子</label>
                        <input type="date" id="depDate" required class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">定期時長</label>
                        <select id="depDuration" onchange="calculateDeposit()" class="w-full px-3 py-1.5 border-2 border-[#1E293B] rounded-xl text-xs font-bold bg-white">
                            <option value="3個月">3個月</option>
                            <option value="6個月">6個月</option>
                            <option value="1年">1年</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-extrabold text-slate-500 mb-1">本金 (HKD)</label>

                                <th class="py-2.5 px-4">年利率</th>
                                <th class="py-2.5 px-4 text-amber-600">利息</th>
                                <th class="py-2.5 px-4">最終落袋</th>
                                <th class="py-2.5 px-4 text-right">動作</th>

                    </table>
                </div>

                <div id="depShowAllContainer" class="mt-4 text-center hidden">
                    <button id="depShowAllBtn" onclick="toggleShowAll('deposits')" class="text-xs font-black text-sky-600 hover:underline">

                    </button>

            </section>
        </main>
    </div>

    <!-- JavaScript Core Mechanics Engine -->
    <script>
        // --- 1. Multi-User Authentication Engine ---
        let currentAuthMode = 'login'; 
        let activeUser = null;

        function switchAuthMode(mode) {
            currentAuthMode = mode;
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const submitAuthBtn = document.getElementById('submitAuthBtn');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.classList.add('hidden');

            if (mode === 'login') {
                tabLogin.className = "flex-1 py-1.5 text-xs font-black rounded-xl bg-white border-2 border-[#1E293B]";
                tabRegister.className = "flex-1 py-1.5 text-xs font-black rounded-xl text-slate-500 hover:text-[#0F172A]";
                submitAuthBtn.innerHTML = "開嚟見我！";
            } else {
                tabRegister.className = "flex-1 py-1.5 text-xs font-black rounded-xl bg-white border-2 border-[#1E293B]";
                tabLogin.className = "flex-1 py-1.5 text-xs font-black rounded-xl text-slate-500 hover:text-[#0F172A]";
                submitAuthBtn.innerHTML = "加入";
            }
        }

        function getRegisteredUsers() {
            const users = localStorage.getItem('toy_story_users_list');
            return users ? JSON.parse(users) : {};
        }

        function handleAuthAction() {
            const usernameInput = document.getElementById('usernameInput').value.trim();
            const passwordInput = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!usernameInput || !passwordInput) {
                showAuthError("要話我聽你係邊位同密碼先得㗎！");
                return;
            }

            const users = getRegisteredUsers();

            if (currentAuthMode === 'login') {
                if (users[usernameInput] && users[usernameInput] === passwordInput) {
                    errorMsg.classList.add('hidden');
                    loginSuccess(usernameInput);
                } else {
                    showAuthError("⚠️ 密碼定名錯咗？");
                }
            } else {
                if (users[usernameInput]) {
                    showAuthError("⚠️ 呢個名一早俾其他人用咗啦！");
                } else {
                    users[usernameInput] = passwordInput;
                    localStorage.setItem('toy_story_users_list', JSON.stringify(users));
                    alert(`🎉 [ ${usernameInput} ] 歡迎來到個人財務管理系統！`);
                    errorMsg.classList.add('hidden');
                    loginSuccess(usernameInput);
                }
            }
        }

        function showAuthError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function loginSuccess(username) {
            activeUser = username;
            document.getElementById('currentUserDisplay').textContent = username;
            
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            
            loadUserRecords();
        }

        function handleLogout() {
            activeUser = null;
            document.getElementById('usernameInput').value = "";
            document.getElementById('passwordInput').value = "";
            document.getElementById('mainDashboard').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            switchAuthMode('login');
        }


        // --- 2. Data Persistence ---

        let records = { incomes: [], insurances: [], deposits: [] };
        let viewState = {
            incomes: { showAll: false, editIndex: null },
            insurances: { showAll: false, editIndex: null },
            deposits: { showAll: false, editIndex: null }
        };

        function loadUserRecords() {
            const isolatedKey = `toy_story_records_${activeUser}`;
            const storedData = localStorage.getItem(isolatedKey);
            if (storedData) {
                records = JSON.parse(storedData);
                sortAllRecordsByDate();
            } else {
                records = { incomes: [], insurances: [], deposits: [] };
            }
            
            viewState.incomes.editIndex = null;
            viewState.insurances.editIndex = null;
            viewState.deposits.editIndex = null;
            
            document.getElementById('incYearFilter').value = 'all';
            document.getElementById('incCompanyFilter').value = 'all';
            document.getElementById('insYearFilter').value = 'all';
            document.getElementById('insCompanyFilter').value = 'all'; 
            document.getElementById('depYearFilter').value = 'all';
            document.getElementById('depBankFilter').value = 'all';

            populateYearFilters();
            populateCompanyFilter();
            renderAllTables();
        }

        function saveData() {
            sortAllRecordsByDate();
            const isolatedKey = `toy_story_records_${activeUser}`;
            localStorage.setItem(isolatedKey, JSON.stringify(records));
            populateYearFilters();
            populateCompanyFilter();
            renderAllTables();
        }


        // --- 3. Dynamic Auto Calculations ---

        function calculateIncome() {
            const base = parseFloat(document.getElementById('incBase').value) || 0;
            const bonus = parseFloat(document.getElementById('incBonus').value) || 0;
            const mpf = base >= 30000 ? 1500 : base * 0.05;
            const final = base + bonus - mpf;

            document.getElementById('incMpf').value = mpf.toFixed(2);
            document.getElementById('incFinal').value = final.toFixed(2);
        }

        function calculateDeposit() {
            const principal = parseFloat(document.getElementById('depPrincipal').value) || 0;
            const ratePercent = parseFloat(document.getElementById('depRate').value) || 0;
            const duration = document.getElementById('depDuration').value;

            const rate = ratePercent / 100;
            let timeFactor = duration === "3個月" ? 0.25 : (duration === "6個月" ? 0.5 : 1.0);

            const finalAmount = principal * (1 + (rate * timeFactor));
            const interest = finalAmount - principal;

            document.getElementById('depInterest').value = interest.toFixed(2);
            document.getElementById('depFinal').value = finalAmount.toFixed(2);
        }

        // --- 4. Filtering Helpers ---

        window.onload = function() {
            switchAuthMode('login');
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('incDate').value = today;
            document.getElementById('insDate').value = today;
            document.getElementById('depDate').value = today;
        };

        function sortAllRecordsByDate() {
            records.incomes.sort((a, b) => new Date(b.date) - new Date(a.date));
            records.insurances.sort((a, b) => new Date(b.date) - new Date(a.date));
            records.deposits.sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function populateYearFilters() {
            const getYears = (arr) => [...new Set(arr.map(item => new Date(item.date).getFullYear()))].sort((a,b)=>b-a);
            
            ['inc', 'ins', 'dep'].forEach(prefix => {
                const select = document.getElementById(`${prefix}YearFilter`);
                const currentVal = select.value;
                select.innerHTML = '<option value="all">全部年份</option>';
                
                let targetArr = prefix === 'inc' ? records.incomes : (prefix === 'ins' ? records.insurances : records.deposits);
                getYears(targetArr).forEach(year => {
                    if(!isNaN(year)) select.innerHTML += `<option value="${year}">${year}年</option>`;
                });
                select.value = currentVal; 
            });
        }

        function populateCompanyFilter() {
            const select = document.getElementById('incCompanyFilter');
            const currentVal = select.value;
            select.innerHTML = '<option value="all">全部公司</option>';

            const companies = [...new Set(records.incomes.map(item => (item.company || '').trim()))].filter(Boolean);
            companies.forEach(comp => {
                select.innerHTML += `<option value="${comp}">${comp}</option>`;
            });
            select.value = currentVal;
        }

        function clearDateFilter(prefix) {
            document.getElementById(`${prefix}StartDate`).value = '';
            document.getElementById(`${prefix}EndDate`).value = '';
            if(prefix === 'inc') renderIncomeTable();
            if(prefix === 'ins') renderInsuranceTable();
            if(prefix === 'dep') renderDepositTable();
        }

        function toggleShowAll(category) {
            viewState[category].showAll = !viewState[category].showAll;
            renderAllTables();
        }


        // --- 5. Custom Tables Rendering & Filter Mechanics ---

        function renderIncomeTable() {
            const tbody = document.getElementById('incomeTableBody');
            const container = document.getElementById('incShowAllContainer');
            const btn = document.getElementById('incShowAllBtn');
            
            const yearFilter = document.getElementById('incYearFilter').value;
            const companyFilter = document.getElementById('incCompanyFilter').value;
            const startDate = document.getElementById('incStartDate').value;
            const endDate = document.getElementById('incEndDate').value;

            tbody.innerHTML = '';

            let filteredList = records.incomes.filter(item => {
                const itemDate = new Date(item.date);
                let matchesYear = (yearFilter === 'all') || (itemDate.getFullYear().toString() === yearFilter);
                let matchesCompany = (companyFilter === 'all') || (item.company === companyFilter);
                
                let matchesDateRange = true;
                if (startDate) matchesDateRange = matchesDateRange && (itemDate >= new Date(startDate));
                if (endDate) matchesDateRange = matchesDateRange && (itemDate <= new Date(endDate + "T23:59:59"));

                return matchesYear && matchesCompany && matchesDateRange;
            });

            let totalSum = filteredList.reduce((acc, item) => acc + (parseFloat(item.final) || 0), 0);
            document.getElementById('summaryTotal').textContent = `$${totalSum.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

            const limit = 5;
            const displayList = viewState.incomes.showAll ? filteredList : filteredList.slice(0, limit);

            displayList.forEach((item) => {
                const actualIndex = records.incomes.indexOf(item);
                
                if (viewState.incomes.editIndex === actualIndex) {
                    tbody.innerHTML += `
                        <tr class="bg-sky-50/70">
                            <td class="p-2"><input type="text" id="editIncComp" value="${item.company}" class="w-full px-2 py-1 border-2 border-[#1E293B] rounded-md text-xs bg-white"></td>
                            <td class="p-2"><input type="date" id="editIncDate" value="${item.date}" class="w-full px-2 py-1 border-2 border-[#1E293B] rounded-md text-xs bg-white"></td>
                            <td class="p-2"><input type="number" id="editIncBase" value="${item.base}" oninput="calcInlineInc()" class="w-full px-2 py-1 border-2 border-[#1E293B] rounded-md text-xs bg-white"></td>
                            <td class="p-2"><input type="number" id="editIncBonus" value="${item.bonus}" oninput="calcInlineInc()" class="w-full px-2 py-1 border-2 border-[#1E293B] rounded-md text-xs bg-white"></td>
                            <td class="p-2 text-slate-500 text-xs" id="editIncMpf">-$${parseFloat(item.mpf).toFixed(2)}</td>
                            <td class="p-2 text-sky-600 font-black text-xs" id="editIncFinal">$${parseFloat(item.final).toFixed(2)}</td>
                            <td class="p-2 text-right space-x-2">
                                <button onclick="saveInlineEdit('incomes', ${actualIndex})" class="text-green-600 hover:text-green-800 font-extrabold">儲存</button>
                                <button onclick="cancelInlineEdit('incomes')" class="text-slate-500 hover:text-slate-700 font-extrabold">取消</button>
                            </td>
                        </tr>
                    `;
                } else {
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="py-3 px-4 text-slate-800 font-extrabold">${item.company}</td>
                            <td class="py-3 px-4 text-slate-500">${item.date}</td>
                            <td class="py-3 px-4">$${parseFloat(item.base).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="py-3 px-4">$${parseFloat(item.bonus).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="py-3 px-4 text-red-500">-$${parseFloat(item.mpf).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="py-3 px-4 font-black text-sky-600">$${parseFloat(item.final).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="py-3 px-4 text-right space-x-3">
                                <button onclick="startInlineEdit('incomes', ${actualIndex})" class="text-sky-600 hover:underline font-extrabold">修改</button>
                                <button onclick="deleteRecord('incomes', ${actualIndex})" class="text-slate-500 hover:underline font-extrabold">丟棄</button>
                            </td>
                        </tr>
                    `;
                }
            });

            if (filteredList.length > limit) {
                container.classList.remove('hidden');
                btn.textContent = viewState.incomes.showAll ? `收起紀錄 ↑` : `顯示全部紀錄 (共 ${filteredList.length} 筆) ↓`;
            } else {
                container.classList.add('hidden');
            }
        }

        function calcInlineInc() {
            const base = parseFloat(document.getElementById('editIncBase').value) || 0;
            const bonus = parseFloat(document.getElementById('editIncBonus').value) || 0;
            const mpf = base >= 30000 ? 1500 : base * 0.05;
            document.getElementById('editIncMpf').textContent = `-$${mpf.toFixed(2)}`;
            document.getElementById('editIncFinal').textContent = `$${(base + bonus - mpf).toFixed(2)}`;
        }

                                    <option value="FWD富衛保險" ${item.company==='FWD富衛保險'?'selected':''}>FWD富衛保險</option>

                            <td class="p-2">
                                <select id="editInsType" class="w-full px-1 py-1 border-2 border-[#1E293B] rounded-md text-xs bg-white">

                                <button onclick="cancelInlineEdit('insurances')" class="text-slate-500 hover:text-slate-700 font-extrabold">取消</button>

                } else {

                const matchesYear = (yearFilter === 'all') || (itemDate.getFullYear().toString() === yearFilter);
                
                let matchesDateRange = true;
                if (startDate) matchesDateRange = matchesDateRange && (itemDate >= new Date(startDate));
                if (endDate) matchesDateRange = matchesDateRange && (itemDate <= new Date(endDate + "T23:59:59"));

            displayList.forEach((item) => {

                if (viewState.deposits.editIndex === actualIndex) {
                    tbody.innerHTML += `

                                </select>
                            </td>
                            <td class="p-2"><input type="number" id="editDepPri" value="${item.principal}" oninput="calcInlineDep()" class="w-full px-2 py-1 border-2 border-[#1E293B] rounded-md text-xs bg-white"></td>
                            <td class="p-2"><input type="number" id="editDepRate" value="${item.rate}" oninput="calcInlineDep()" class="w-full px-2 py-1 border-2 border-[#1E293B] rounded-md text-xs bg-white"></td>
                            <td class="p-2 text-amber-600 font-bold text-xs" id="editDepInt">$${parseFloat(item.interest || 0).toFixed(2)}</td>
                            <td class="p-2 text-emerald-600 font-bold text-xs" id="editDepFin">$${parseFloat(item.final).toFixed(2)}</td>
                            <td class="p-2 text-right space-x-2">
                                <button onclick="saveInlineEdit('deposits', ${actualIndex})" class="text-green-600 hover:text-green-800 font-extrabold">儲存</button>
                                <button onclick="cancelInlineEdit('deposits')" class="text-slate-500 hover:text-slate-700 font-extrabold">取消</button>
                            </td>
                        </tr>
                    `;
                } else {
                    const interestAmount = parseFloat(item.interest) || (parseFloat(item.final) - parseFloat(item.principal));
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="py-3 px-4 text-slate-700 font-extrabold">${item.bank}</td>
                            <td class="py-3 px-4 text-slate-500">${item.date}</td>
                            <td class="py-3 px-4"><span class="bg-[#F0F7FF] text-slate-800 px-2 py-0.5 rounded-lg border-2 border-[#1E293B] text-xs">${item.duration}</span></td>
                            <td class="py-3 px-4">$${parseFloat(item.principal).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="py-3 px-4">${item.rate}%</td>
                            <td class="py-3 px-4 font-bold text-amber-600">$${interestAmount.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="py-3 px-4 font-black text-emerald-600">$${parseFloat(item.final).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="py-3 px-4 text-right space-x-3">
                                <button onclick="startInlineEdit('deposits', ${actualIndex})" class="text-sky-600 hover:underline font-extrabold">修改</button>
                                <button onclick="deleteRecord('deposits', ${actualIndex})" class="text-slate-500 hover:underline font-extrabold">丟棄</button>
                            </td>
                        </tr>
                    `;
                }
            });

            if (filteredList.length > limit) {
                container.classList.remove('hidden');
                btn.textContent = viewState.deposits.showAll ? `收起紀錄 ↑` : `顯示全部紀錄 (共 ${filteredList.length} 筆) ↓`;
            } else {
                container.classList.add('hidden');
            }
        }

        function calcInlineDep() {
            const principal = parseFloat(document.getElementById('editDepPri').value) || 0;
            const ratePercent = parseFloat(document.getElementById('editDepRate').value) || 0;
            const duration = document.getElementById('editDepDur').value;
            const rate = ratePercent / 100;
            let tf = duration === "3個月" ? 0.25 : (duration === "6個月" ? 0.5 : 1.0);

            const fin = principal * (1 + (rate * tf));
            const intAmt = fin - principal;
            document.getElementById('editDepInt').textContent = `$${intAmt.toFixed(2)}`;
            document.getElementById('editDepFin').textContent = `$${fin.toFixed(2)}`;
        }

        function renderAllTables() {
            renderIncomeTable();
            renderInsuranceTable();
            renderDepositTable();
        }


        // --- 6. Inline Editing Logic ---

        function startInlineEdit(category, index) {
            viewState[category].editIndex = index;
            renderAllTables();
        }

        function cancelInlineEdit(category) {
            viewState[category].editIndex = null;
            renderAllTables();
        }

        function saveInlineEdit(category, index) {
            if (category === 'incomes') {
                const base = parseFloat(document.getElementById('editIncBase').value) || 0;
                const bonus = parseFloat(document.getElementById('editIncBonus').value) || 0;
                const mpf = base >= 30000 ? 1500 : base * 0.05;
                records.incomes[index] = {
                    company: document.getElementById('editIncComp').value,
                    date: document.getElementById('editIncDate').value,
                    base: base,
                    bonus: bonus,
                    mpf: mpf,
                    final: base + bonus - mpf
                };
            } else if (category === 'insurances') {
                records.insurances[index] = {
                    company: document.getElementById('editInsComp').value,
                    plan: document.getElementById('editInsPlan').value,
                    type: document.getElementById('editInsType').value,
                    mode: document.getElementById('editInsMode').value,
                    date: document.getElementById('editInsDate').value,
                    amount: parseFloat(document.getElementById('editInsAmount').value) || 0
                };
            } else if (category === 'deposits') {
                const principal = parseFloat(document.getElementById('editDepPri').value) || 0;
                const ratePercent = parseFloat(document.getElementById('editDepRate').value) || 0;
                const duration = document.getElementById('editDepDur').value;
                let tf = duration === "3個月" ? 0.25 : (duration === "6個月" ? 0.5 : 1.0);
                const final = principal * (1 + ((ratePercent / 100) * tf));
                
                records.deposits[index] = {
                    bank: document.getElementById('editDepBank').value,
                    date: document.getElementById('editDepDate').value,
                    duration: duration,
                    principal: principal,
                    rate: ratePercent,
                    interest: final - principal,
                    final: final
                };
            }
            viewState[category].editIndex = null;
            saveData();
        }


        // --- 7. Export to CSV Functions ---

        function exportCSV(category) {
            const list = records[category];
            if (!list || list.length === 0) {
                alert('目前沒有資料可以匯出。');
                return;
            }

            let csvContent = "";
            let fileName = "";

            if (category === 'incomes') {
                csvContent += "公司名稱,日期,基本薪金,花紅_獎金,強積金(上限$1500),最終收入\n";
                list.forEach(item => csvContent += `"${item.company}","${item.date}",${item.base},${item.bonus},${item.mpf},${item.final}\n`);
                fileName = `${activeUser}_打工收入紀錄.csv`;
            } else if (category === 'insurances') {
                csvContent += "保險公司,保險計劃,性質,繳費模式,日期,繳費金額\n";
                list.forEach(item => csvContent += `"${item.company}","${item.plan}","${item.type}","${item.mode}","${item.date}",${item.amount}\n`);
                fileName = `${activeUser}_保險紀錄.csv`;
            } else if (category === 'deposits') {
                csvContent += "銀行,起息日期,定期時長,本金,年利率(%),利息,最終可得\n";
                list.forEach(item => {
                    const interest = item.interest || (item.final - item.principal);
                    csvContent += `"${item.bank}","${item.date}","${item.duration}",${item.principal},${item.rate},${interest.toFixed(2)},${item.final}\n`;
                });
                fileName = `${activeUser}_定期定存紀錄.csv`;
            }

            downloadCSVBlob(csvContent, fileName);
        }

        function exportAllSectionsCSV() {
            const hasIncomes = records.incomes && records.incomes.length > 0;
            const hasInsurances = records.insurances && records.insurances.length > 0;
            const hasDeposits = records.deposits && records.deposits.length > 0;

            if (!hasIncomes && !hasInsurances && !hasDeposits) {
                alert('目前沒有任何紀錄可以匯出！');
                return;
            }

            let csvContent = `=== ${activeUser} 的個人財務全紀錄匯出 ===\n\n`;

            csvContent += "[ 1. 個人收入紀錄 ]\n";
            csvContent += "公司名稱,日期,基本薪金,花紅_獎金,強積金,最終落袋\n";
            if (hasIncomes) {
                records.incomes.forEach(item => {
                    csvContent += `"${item.company}","${item.date}",${item.base},${item.bonus},${item.mpf},${item.final}\n`;
                });
            } else {
                csvContent += "無資料\n";
            }
            csvContent += "\n";

            csvContent += "[ 2. 個人保險紀錄 ]\n";
            csvContent += "保險公司,保險計劃,性質,繳費模式,日期,繳費金額\n";
            if (hasInsurances) {
                records.insurances.forEach(item => {
                    csvContent += `"${item.company}","${item.plan}","${item.type}","${item.mode}","${item.date}",${item.amount}\n`;
                });
            } else {
                csvContent += "無資料\n";
            }
            csvContent += "\n";

            csvContent += "[ 3. 定期存款紀錄 ]\n";
            csvContent += "銀行,起息日期,定期時長,本金,年利率(%),利息,最終落袋\n";
            if (hasDeposits) {
                records.deposits.forEach(item => {
                    const interest = item.interest || (item.final - item.principal);
                    csvContent += `"${item.bank}","${item.date}","${item.duration}",${item.principal},${item.rate},${interest.toFixed(2)},${item.final}\n`;
                });
            } else {
                csvContent += "無資料\n";
            }

            downloadCSVBlob(csvContent, `${activeUser}_財務管理全清單匯出.csv`);
        }

        function downloadCSVBlob(csvContent, fileName) {
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }


        // --- 8. Standard Form Submission Handlers ---

        document.getElementById('incomeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const base = parseFloat(document.getElementById('incBase').value) || 0;
            const bonus = parseFloat(document.getElementById('incBonus').value) || 0;
            const mpf = base >= 30000 ? 1500 : base * 0.05;

            records.incomes.push({
                company: document.getElementById('incCompany').value,
                date: document.getElementById('incDate').value,
                base: base,
                bonus: bonus,
                mpf: mpf,
                final: base + bonus - mpf
            });

            saveData();
            this.reset();
            document.getElementById('incDate').value = new Date().toISOString().split('T')[0];
        });

        document.getElementById('insuranceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            records.insurances.push({
                company: document.getElementById('insCompany').value,
                plan: document.getElementById('insPlan').value,
                type: document.getElementById('insType').value,
                mode: document.getElementById('insMode').value,
                date: document.getElementById('insDate').value,
                amount: parseFloat(document.getElementById('insAmount').value) || 0
            });

            saveData();
            this.reset();
            document.getElementById('insDate').value = new Date().toISOString().split('T')[0];
        });

        document.getElementById('depositForm').addEventListener('submit', function(e) {
            e.preventDefault();
            calculateDeposit(); 
            const principal = parseFloat(document.getElementById('depPrincipal').value) || 0;
            const final = parseFloat(document.getElementById('depFinal').value) || 0;

            records.deposits.push({
                bank: document.getElementById('depBank').value,
                date: document.getElementById('depDate').value,
                duration: document.getElementById('depDuration').value,
                principal: principal,
                rate: parseFloat(document.getElementById('depRate').value) || 0,
                interest: final - principal,
                final: final
            });

            saveData();
            this.reset();
            document.getElementById('depDate').value = new Date().toISOString().split('T')[0];
        });

        function deleteRecord(category, index) {
            if (confirm('確定要掉走呢筆紀錄？')) {
                records[category].splice(index, 1);
                saveData();
            }
        }
    </script>
</body>
</html>
